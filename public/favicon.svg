<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#A8862E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldFaint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#A8862E;stop-opacity:0.2" />
    </linearGradient>
    <radialGradient id="vaultFace" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1e1e16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a08;stop-opacity:1" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sharpGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0D0D0B"/>

  <!-- Subtle corner grid marks -->
  <g stroke="#C9A84C" stroke-width="1" opacity="0.12">
    <line x1="60" y1="60" x2="160" y2="60"/>
    <line x1="60" y1="60" x2="60" y2="160"/>
    <line x1="1020" y1="60" x2="920" y2="60"/>
    <line x1="1020" y1="60" x2="1020" y2="160"/>
    <line x1="60" y1="1020" x2="160" y2="1020"/>
    <line x1="60" y1="1020" x2="60" y2="920"/>
    <line x1="1020" y1="1020" x2="920" y2="1020"/>
    <line x1="1020" y1="1020" x2="1020" y2="920"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!--        VAULT ICON — centred top         -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Vault centred at 540, 390 — radius 290 -->

  <!-- Outer bezel -->
  <circle cx="540" cy="390" r="290" fill="none" stroke="url(#goldGrad)" stroke-width="7"/>
  <circle cx="540" cy="390" r="282" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.35"/>

  <!-- Blueprint concentric rings -->
  <circle cx="540" cy="390" r="268" fill="none" stroke="url(#goldFaint)" stroke-width="1.4"/>
  <circle cx="540" cy="390" r="252" fill="none" stroke="url(#goldFaint)" stroke-width="1"/>
  <circle cx="540" cy="390" r="236" fill="none" stroke="url(#goldFaint)" stroke-width="1"/>
  <circle cx="540" cy="390" r="220" fill="none" stroke="url(#goldFaint)" stroke-width="1"/>
  <circle cx="540" cy="390" r="204" fill="none" stroke="url(#goldFaint)" stroke-width="1"/>

  <!-- Vault face -->
  <circle cx="540" cy="390" r="188" fill="url(#vaultFace)" stroke="url(#goldGrad)" stroke-width="4.5"/>
  <circle cx="540" cy="390" r="178" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.45"/>

  <!-- Tick marks at 15° intervals -->
  <g stroke="#C9A84C" stroke-width="1.2" opacity="0.5">
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(0,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(15,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(30,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(45,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(60,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(75,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(90,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(105,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(120,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(135,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(150,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(165,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(180,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(195,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(210,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(225,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(240,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(255,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(270,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(285,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(300,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(315,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(330,540,390)"/>
    <line x1="540" y1="103" x2="540" y2="80" transform="rotate(345,540,390)"/>
  </g>

  <!-- Locking bolt dots at 45° -->
  <g fill="#C9A84C" filter="url(#sharpGlow)">
    <circle cx="540" cy="103" r="8"  transform="rotate(0,540,390)"/>
    <circle cx="540" cy="103" r="8"  transform="rotate(45,540,390)"/>
    <circle cx="540" cy="103" r="8"  transform="rotate(90,540,390)"/>
    <circle cx="540" cy="103" r="8"  transform="rotate(135,540,390)"/>
    <circle cx="540" cy="103" r="8"  transform="rotate(180,540,390)"/>
    <circle cx="540" cy="103" r="8"  transform="rotate(225,540,390)"/>
    <circle cx="540" cy="103" r="8"  transform="rotate(270,540,390)"/>
    <circle cx="540" cy="103" r="8"  transform="rotate(315,540,390)"/>
  </g>

  <!-- Crosshair spokes -->
  <g filter="url(#sharpGlow)">
    <line x1="358" y1="390" x2="722" y2="390" stroke="url(#goldGrad)" stroke-width="5"/>
    <line x1="540" y1="208" x2="540" y2="572" stroke="url(#goldGrad)" stroke-width="5"/>
    <!-- Spoke end nodes -->
    <circle cx="358" cy="390" r="11" fill="#0D0D0B" stroke="url(#goldGrad)" stroke-width="4"/>
    <circle cx="722" cy="390" r="11" fill="#0D0D0B" stroke="url(#goldGrad)" stroke-width="4"/>
    <circle cx="540" cy="208" r="11" fill="#0D0D0B" stroke="url(#goldGrad)" stroke-width="4"/>
    <circle cx="540" cy="572" r="11" fill="#0D0D0B" stroke="url(#goldGrad)" stroke-width="4"/>
  </g>

  <!-- Diagonal bolt markers -->
  <g stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.6">
    <line x1="411" y1="261" x2="440" y2="290"/>
    <line x1="669" y1="261" x2="640" y2="290"/>
    <line x1="411" y1="519" x2="440" y2="490"/>
    <line x1="669" y1="519" x2="640" y2="490"/>
  </g>
  <g fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.6">
    <circle cx="411" cy="261" r="8"/>
    <circle cx="669" cy="261" r="8"/>
    <circle cx="411" cy="519" r="8"/>
    <circle cx="669" cy="519" r="8"/>
  </g>

  <!-- Inner hub -->
  <circle cx="540" cy="390" r="65" fill="#0D0D0B" stroke="url(#goldGrad)" stroke-width="4.5"/>
  <circle cx="540" cy="390" r="52" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.55"/>

  <!-- Centre pivot -->
  <circle cx="540" cy="390" r="18" fill="url(#goldGrad)" filter="url(#glow)"/>
  <circle cx="540" cy="390" r="7"  fill="#0D0D0B"/>

  <!-- ═══════════════════════════════════════ -->
  <!--       HORIZONTAL RULE SEPARATOR         -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="160" y1="730" x2="920" y2="730" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══════════════════════════════════════ -->
  <!--             WORDMARK                    -->
  <!-- ═══════════════════════════════════════ -->

  <!-- IVD -->
  <text
    x="540"
    y="860"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="220"
    font-weight="700"
    letter-spacing="18"
    text-anchor="middle"
    fill="url(#goldGrad)"
    filter="url(#textGlow)"
  >IVD</text>

  <!-- Underline -->
  <line x1="200" y1="880" x2="880" y2="880" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Diamond accents on underline -->
  <polygon points="540,872 547,880 540,888 533,880" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- IRON VAULT DIGITAL -->
  <text
    x="540"
    y="950"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="400"
    letter-spacing="14"
    text-anchor="middle"
    fill="#C9A84C"
    opacity="0.85"
  >IRON VAULT DIGITAL</text>

</svg>
