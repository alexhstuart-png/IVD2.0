<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Iron Vault Digital</title>
    <meta name="description" content="Web design and digital marketing for Australian tradies and small businesses. Based in Kalgoorlie, WA." />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Iron Vault Digital" />
    <meta property="og:description" content="Web design and digital marketing for Australian tradies and small businesses. Based in Kalgoorlie, WA." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Hidden Netlify forms for detection during deploy post-processing -->
    <form name="contact-v1" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="contact-v1" />
      <input name="bot-field" />
      <input name="name" />
      <input name="business" />
      <input name="email" />
      <input name="phone" />
      <input name="service" />
      <input name="services[]" />
      <input name="addons[]" />
      <input name="timeline" />
      <input name="message" />
      <input name="budget" />
    </form>

    <form name="book-call" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="book-call" />
      <input name="bot-field" />
      <input name="name" />
      <input name="company" />
      <input name="email" />
      <input name="phone" />
      <input name="website" />
      <input name="goal" />
      <input name="call-services[]" />
      <input name="budget" />
      <input name="call-timeline" />
      <input name="notes" />
    </form>

    <form name="chatbot-lead" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="chatbot-lead" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <textarea name="message"></textarea>
    </form>

    <form name="welcome-gate" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="welcome-gate" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
