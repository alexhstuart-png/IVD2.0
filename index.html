    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

  <body>
    <!-- Hidden Netlify forms for detection during deploy post-processing -->
    <form name="contact-v1" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="contact-v1" />
      <input name="bot-field" />

      <input name="email" />

      <input name="services[]" />
      <input name="addons[]" />
      <input name="timeline" />
      <input name="message" />
      <input name="budget" />
    </form>

    <form name="book-call" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="book-call" />
      <input name="bot-field" />
      <input name="name" />
      <input name="company" />
      <input name="email" />
      <input name="phone" />
      <input name="website" />
      <input name="goal" />
      <input name="call-services[]" />
      <input name="budget" />
      <input name="call-timeline" />
      <input name="notes" />
    </form>

    <form name="chatbot-lead" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="chatbot-lead" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <textarea name="message"></textarea>
    </form>

    <form name="plumber-leads" netlify netlify-honeypot="bot-field" hidden>

      <input name="name" />
      <input name="business" />
      <input name="email" />
      <input name="phone" />
      <input name="website" />
      <textarea name="message"></textarea>
    </form>

    <form name="welcome-gate" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="welcome-gate" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
    </form>

    <form name="rapid-growth-enquiry" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="rapid-growth-enquiry" />
      <input name="bot-field" />

    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

<script>
document.addEventListener("click", function(e) {
  if (typeof gtag !== "function") return;

  const el = e.target.closest("a, button");
  if (!el) return;

  const text = (el.innerText || "").toLowerCase();

  if (text.includes("vault")) {
    gtag("event", "cta_click", {
      event_category: "CTA",
      event_label: "Open The Vault"
    });
    console.log("CTA Vault fired");
  }

  if (text.includes("growth")) {
    gtag("event", "cta_click", {
      event_category: "CTA",
      event_label: "Unlock Growth"
    });
    console.log("CTA Growth fired");
  }

  if (text.includes("arsenal")) {
    gtag("event", "cta_click", {
      event_category: "CTA",
      event_label: "Our Arsenal"
    });
    console.log("CTA Arsenal fired");
  }
});

document.addEventListener("submit", function() {
  if (typeof gtag !== "function") return;

  gtag("event", "form_submit", {
    event_category: "Lead",
    event_label: "Contact Form"
  });

  console.log("Form submit fired");
});
</script>
  </body>
</html>
